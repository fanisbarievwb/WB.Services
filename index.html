    <style>
        :root {
            --bg-color: #f7f7f9;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #000000; /* Строгий черный акцент вместо синего */
            --border-color: #e5e7eb;
            --muted-color: #71717a;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        /* Полная центровка по вертикали и горизонтали */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Минималистичная карточка-контейнер */
        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 28px;
            letter-spacing: -0.02em;
            text-align: center;
        }

        /* Стилизация выпадающего списка */
        .select-wrapper {
            position: relative;
            margin-bottom: 0; /* Меняется динамически при появлении контента */
            transition: margin-bottom 0.3s ease;
        }
        
        .select-wrapper.has-result {
            margin-bottom: 32px;
        }

        select {
            width: 100%;
            padding: 14px 20px;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--card-bg);
            appearance: none;
            outline: none;
            cursor: pointer;
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        /* Изящная стрелочка */
        .select-wrapper::after {
            content: "";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            border: 4px solid transparent;
            border-top-color: var(--muted-color);
            pointer-events: none;
            transition: transform 0.2s ease;
        }
        
        select:focus + .select-wrapper::after {
            transform: translateY(-75%) rotate(180deg);
        }

        /* Блок с результатом и анимацией плавного появления */
        .result-box {
            border-top: 1px solid var(--border-color);
            padding-top: 28px;
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-box.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted-color);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 24px;
            color: var(--text-color);
        }

        .value:last-child {
            margin-bottom: 0;
        }

        /* Красивые кликабельные контакты */
        .value a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2px;
            transition: border-color 0.2s ease;
        }

        .value a:hover {
            border-bottom-color: var(--accent-color);
        }
    </style>
</head>

            // Если первое свойство "id", берем второе (текст проблемы), иначе первое
            const issueText = typeof item.id !== 'undefined' && Object.keys(item)[0] === 'id' ? values[1] : values[0];
            
            option.textContent = issueText || "Без названия";
            selectEl.appendChild(option);
        });

        // Функция отображения результата
        function showDetails() {
            const selectedIndex = selectEl.value;
            const selectedData = data[selectedIndex];

            if (selectedData) {
                // Превращаем объект в массив только его значений (текста)
                // Игнорируем техническое поле "id", если оно есть
                let values = Object.keys(selectedData)[0] === 'id' 
                    ? Object.values(selectedData).slice(1) 
                    : Object.values(selectedData);

                // Теперь строго распределяем по порядку:
                // values[0] — это проблема (уже в списке)
                // values[1] — это служба (2-й столбец)
                // values[2] — это контакты (3-й столбец)
                const serviceText = values[1] || '—';
                const contactText = values[2] || '—';

                serviceVal.textContent = serviceText;
                
                // Делаем кликабельный телефон, если в строке есть цифры
                if (String(contactText).match(/[0-9]/)) {
                    contactVal.innerHTML = `<a href="tel:${String(contactText).replace(/[^0-9+]/g, '')}">${contactText}</a>`;
                } else {
                    contactVal.textContent = contactText;
                }

                resultBox.classList.add('active');
            } else {
                resultBox.classList.remove('active');
            }
        }
